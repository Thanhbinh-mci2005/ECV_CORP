const Donut=({data,size=160,hole=0.6,showLegend=true})=>{
  const total=data.reduce((s,d)=>s+d.v,0);
  if(total===0)return <div style={{textAlign:"center",color:T.txM,padding:20}}>Không có dữ liệu</div>;
  const r=size/2, ir=r*hole;
  let cum=0;
  const arcs=data.map((d,i)=>{
    const pct=d.v/total, start=cum, end=cum+pct;
    cum=end;
    const s1=start*Math.PI*2-Math.PI/2, e1=end*Math.PI*2-Math.PI/2;
    const x1=r+r*.9*Math.cos(s1), y1=r+r*.9*Math.sin(s1);
    const x2=r+r*.9*Math.cos(e1), y2=r+r*.9*Math.sin(e1);
    const x3=r+ir*Math.cos(e1), y3=r+ir*Math.sin(e1);
    const x4=r+ir*Math.cos(s1), y4=r+ir*Math.sin(s1);
    const large=pct>.5?1:0;
    const path=`M${x1},${y1} A${r*.9},${r*.9} 0 ${large},1 ${x2},${y2} L${x3},${y3} A${ir},${ir} 0 ${large},0 ${x4},${y4} Z`;
    return <path key={i} d={path} fill={BC[i%BC.length]} opacity={.9}/>;
  });
  return (
    <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {arcs}
        <text x={r} y={r-6} textAnchor="middle" fill={T.tx} fontSize={16} fontWeight={700} fontFamily="'DM Mono',monospace">{f(total)}</text>
        <text x={r} y={r+10} textAnchor="middle" fill={T.txD} fontSize={9}>Tổng</text>
      </svg>
      {showLegend&&<div style={{display:"flex",flexDirection:"column",gap:4}}>
        {data.map((d,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:5,fontSize:10}}>
            <div style={{width:8,height:8,borderRadius:2,background:BC[i%BC.length],flexShrink:0}}/>
            <span style={{color:T.txD}}>{d.l}</span>
            <span style={{color:T.tx,fontFamily:"'DM Mono',monospace",marginLeft:"auto"}}>{f(d.v)}</span>
            <span style={{color:T.txM,width:35,textAlign:"right"}}>{(d.v/total*100).toFixed(0)}%</span>
          </div>
        ))}
      </div>}
    </div>
  );
};

const AreaChart=({data,h=140,w=320,color=T.bl,showDots=true,fill=true})=>{
  const mx=Math.max(...data.map(d=>d.v),1);
  const pad={t:20,b:24,l:8,r:8};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  const pts=data.map((d,i)=>({x:pad.l+i*(cw/(data.length-1||1)),y:pad.t+ch-((d.v/mx)*ch)}));
  const line=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
  const area=line+` L${pts[pts.length-1].x},${pad.t+ch} L${pts[0].x},${pad.t+ch} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{overflow:"visible"}}>
      <defs><linearGradient id="areaG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".3"/><stop offset="100%" stopColor={color} stopOpacity=".02"/></linearGradient></defs>
      {[0,.25,.5,.75,1].map((r,i)=><line key={i} x1={pad.l} y1={pad.t+ch*r} x2={w-pad.r} y2={pad.t+ch*r} stroke={T.bdr} strokeWidth=".5" strokeDasharray={r>0&&r<1?"3,3":"0"}/>)}
      {fill&&<path d={area} fill="url(#areaG)"/>}
      <path d={line} fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
      {showDots&&pts.map((p,i)=><g key={i}><circle cx={p.x} cy={p.y} r={4} fill={T.card} stroke={color} strokeWidth={2}/><text x={p.x} y={p.y-10} textAnchor="middle" fill={T.tx} fontSize={8.5} fontFamily="'DM Mono',monospace">{f(data[i].v)}</text></g>)}
      {data.map((d,i)=><text key={i} x={pts[i].x} y={h-4} textAnchor="middle" fill={T.txD} fontSize={8}>{d.l}</text>)}
    </svg>
  );
};

const Waterfall=({items,h=170,w=340})=>{
  const vals=items.map(it=>it.v);
  const mx=Math.max(...vals.map(Math.abs),1);
  const pad={t:22,b:26,l:8,r:8};
  const cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  const bw=cw/items.length*.6, gap=cw/items.length*.4;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`}>
      {items.map((it,i)=>{
        const bx=pad.l+i*(bw+gap)+gap/2;
        const bh=Math.max((it.v/mx)*ch*.8,4);
        const by=it.type==="neg"?pad.t+(ch-bh)/2:pad.t+(ch-bh)/2;
        const col=it.type==="neg"?T.rd:it.type==="result"?T.cy:T.gn;
        return <g key={i}>
          <rect x={bx} y={pad.t+ch-bh-2} width={bw} height={bh} rx={4} fill={col} opacity={.85}/>
          <text x={bx+bw/2} y={pad.t+ch-bh-8} textAnchor="middle" fill={T.tx} fontSize={9} fontFamily="'DM Mono',monospace" fontWeight={600}>{f(it.v)}</text>
          <text x={bx+bw/2} y={h-6} textAnchor="middle" fill={T.txD} fontSize={8}>{it.l}</text>
        </g>;
      })}
    </svg>
  );
};

const Gauge=({value,max=100,label,color=T.bl,size=120})=>{
  const pct=Math.min(value/max,1);
  const r=size/2-10, cx=size/2, cy=size/2+5;
  const startA=-Math.PI*.8, endA=Math.PI*.8, range=endA-startA;
  const descArc=(sa,ea)=>{
    const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
    const large=(ea-sa)>Math.PI?1:0;
    return `M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2}`;
  };
  return (
    <div style={{textAlign:"center"}}>
      <svg width={size} height={size*.7} viewBox={`0 0 ${size} ${size*.75}`}>
        <path d={descArc(startA,endA)} fill="none" stroke={T.bdr} strokeWidth={8} strokeLinecap="round"/>
        <path d={descArc(startA,startA+range*pct)} fill="none" stroke={color} strokeWidth={8} strokeLinecap="round"/>
        <text x={cx} y={cy-4} textAnchor="middle" fill={T.tx} fontSize={18} fontWeight={700} fontFamily="'DM Mono',monospace">{typeof value==="string"?value:(value).toFixed(1)+"%"}</text>
        <text x={cx} y={cy+12} textAnchor="middle" fill={T.txD} fontSize={8.5}>{label}</text>
      </svg>
    </div>
  );
};

const StackedBar=({data,h=150,w=320})=>{

const MultiSelect=({label,options,selected,onChange,w=200})=>{
  const [open,setOpen]=useState(false);
  const allSel=selected.length===0;
  const toggle=v=>{if(selected.includes(v))onChange(selected.filter(x=>x!==v));else onChange([...selected,v]);};
  const display=allSel?"Tất cả":selected.length===1?(options.find(o=>o.value===selected[0])||{}).label||selected[0]:selected.length+" đã chọn";
  return(
    <div style={{display:"flex",alignItems:"center",gap:5,position:"relative"}}>
      <span style={{fontSize:10,color:T.txM,fontWeight:600,textTransform:"uppercase",letterSpacing:.6,whiteSpace:"nowrap"}}>{label}</span>
      <div onClick={()=>setOpen(!open)} style={{background:T.alt,border:"1px solid "+T.bdr,borderRadius:6,padding:"5px 8px",color:T.tx,fontSize:11,fontWeight:500,cursor:"pointer",minWidth:w,userSelect:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{display}</span>
        <span style={{fontSize:8,marginLeft:4}}>{open?"▲":"▼"}</span>
      </div>
      {open&&<div style={{position:"absolute",top:"100%",left:0,marginTop:2,background:T.card,border:"1px solid "+T.bdr,borderRadius:8,padding:6,zIndex:20,minWidth:w+40,maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px rgba(0,0,0,.5)"}}>
        <div onClick={()=>{onChange([]);setOpen(false);}} style={{padding:"5px 8px",fontSize:10.5,color:allSel?T.bl:T.txD,cursor:"pointer",borderRadius:4,background:allSel?T.blG:"transparent",marginBottom:2}}>
          {allSel?"✓ ":""}Tất cả
        </div>
        {options.map(o=>{
          const s=selected.includes(o.value);
          return <div key={o.value} onClick={()=>toggle(o.value)} style={{padding:"5px 8px",fontSize:10.5,color:s?T.bl:T.tx,cursor:"pointer",borderRadius:4,background:s?T.blG:"transparent"}}>
            {s?"✓ ":"   "}{o.label}
          </div>;
        })}
      </div>}
    </div>
  );
};

const DateRange=({label,from,to,onFrom,onTo})=>{
  const toISO=v=>{if(!v||v.length!==10)return"";const p=v.split("/");return p[2]+"-"+p[1]+"-"+p[0];};
  const fromISO=v=>{if(!v)return"";const p=v.split("-");return p[2]+"/"+p[1]+"/"+p[0];};
  return(
    <div style={{display:"flex",alignItems:"center",gap:5}}>
      <span style={{fontSize:10,color:T.txM,fontWeight:600,textTransform:"uppercase",letterSpacing:.6,whiteSpace:"nowrap"}}>{label}</span>
      <input type="date" value={toISO(from)} onChange={e=>onFrom(fromISO(e.target.value))} style={{background:T.alt,border:"1px solid "+T.bdr,borderRadius:6,padding:"4px 6px",color:T.tx,fontSize:11,outline:"none"}}/>
      <span style={{color:T.txM,fontSize:10}}>→</span>
      <input type="date" value={toISO(to)} onChange={e=>onTo(fromISO(e.target.value))} style={{background:T.alt,border:"1px solid "+T.bdr,borderRadius:6,padding:"4px 6px",color:T.tx,fontSize:11,outline:"none"}}/>
    </div>
  );
};

      <Box title="Doanh thu lũy kế"><AreaChart data={dtCum} color={T.bl} w={220} h={135}/></Box>
      <Box title="Doanh thu vs Chi phí"><GroupedBar data={gbData} w={220} h={135}/></Box>
      <Box title="Dòng tiền theo tháng">
        <StackedBar data={cfByMonth} h={135} w={220}/>
        <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:4,fontSize:8}}>
          <span style={{color:T.gn}}>■ Thu</span><span style={{color:T.rd}}>■ Chi</span>

    </Box>
  </div>);
};

// PAGE 3: CÔNG NỢ

const P3=()=>{
  const parseD=s=>{const p=s.split("/");return new Date(+p[2],+p[1]-1,+p[0]);};

  const [loai,setLoai]=useState("ALL");
  const [khSel,setKhSel]=useState([]);
  const [daSel,setDaSel]=useState([]);
  const [dateFrom,setDateFrom]=useState("01/01/2026");
  const [dateTo,setDateTo]=useState("26/05/2026");

  const enriched=useMemo(()=>CN.map(c=>{
    const conLai=c.ps-c.daTT;
    const ngDate=parseD(c.ng);
    return {...c,conLai,ngDate};
  }),[]);

  const filtered=useMemo(()=>{
    return enriched.filter(c=>{
      if(loai!=="ALL"&&c.loai!==loai)return false;
      if(khSel.length>0&&!khSel.includes(c.kh))return false;
      if(daSel.length>0&&!daSel.includes(c.da))return false;
      if(!inDateRange(c.ng,dateFrom,dateTo))return false;
      return true;
    });
  },[loai,khSel,daSel,dateFrom,dateTo,enriched]);

  const tongPS=filtered.reduce((s,c)=>s+c.ps,0);
  const tongDaTT=filtered.reduce((s,c)=>s+c.daTT,0);
  const netCN=tongPS-tongDaTT;
  const hieuQua=tongPS>0?pv(tongDaTT,tongPS):0;

  const dtOptions=useMemo(()=>{
    const list=[];
    if(loai!=="PTr")DM_KH.forEach(k=>list.push({label:k.ten,value:k.ma}));
    if(loai!=="PT")DM_NCC.forEach(n=>list.push({label:n.ten,value:n.ma}));
    return list;
  },[loai]);

  const getName=(l,ma)=>l==="PT"?(DM_KH.find(k=>k.ma===ma)||{}).ten||ma:(DM_NCC.find(n=>n.ma===ma)||{}).ten||ma;

  const netByDay=useMemo(()=>{
    const map={};
    filtered.forEach(c=>{
      if(!map[c.ng]) map[c.ng]={ng:c.ng,pt:0,ptr:0};
      if(c.loai==="PT") map[c.ng].pt+=c.conLai;
      else map[c.ng].ptr+=c.conLai;
    });
    return Object.values(map).sort((a,b)=>parseD(a.ng)-parseD(b.ng));
  },[filtered]);

  const cumByDay=useMemo(()=>{
    const sorted=[...filtered].sort((a,b)=>a.ngDate-b.ngDate);
    const map={};
    let cum=0;
    sorted.forEach(c=>{
      cum+=c.ps-c.daTT;
      map[c.ng]=cum;
    });
    return Object.entries(map).map(([ng,v])=>({l:ng.slice(0,5),v}));
  },[filtered]);

  const byDT={};
  filtered.forEach(c=>{const n=getName(c.loai,c.kh);byDT[n]=(byDT[n]||0)+c.conLai;});
  const dtDonut=Object.entries(byDT).map(([l,v])=>({l,v})).filter(d=>d.v>0).sort((a,b)=>b.v-a.v);

  const thCT=useMemo(()=>DM_CT.map(ct=>{
    const items=filtered.filter(c=>c.da===ct.ma);
    const ptPS=items.filter(c=>c.loai==="PT").reduce((s,c)=>s+c.ps,0);
    const ptTT=items.filter(c=>c.loai==="PT").reduce((s,c)=>s+c.daTT,0);
    const ptrPS=items.filter(c=>c.loai==="PTr").reduce((s,c)=>s+c.ps,0);
    const ptrTT=items.filter(c=>c.loai==="PTr").reduce((s,c)=>s+c.daTT,0);
    const net=(ptPS-ptTT)-(ptrPS-ptrTT);
    if(ptPS===0&&ptrPS===0) return null;
    return {ct:ct.ten,ptPS:f(ptPS),ptTT:f(ptTT),ptCon:f(ptPS-ptTT),ptrPS:f(ptrPS),ptrTT:f(ptrTT),ptrCon:f(ptrPS-ptrTT),net:f(net),
      _c:{ptCon:ptPS-ptTT>0?T.am:T.gn,ptrCon:ptrPS-ptrTT>0?T.pr:T.gn,net:net>=0?T.gn:T.rd}};
  }).filter(Boolean),[filtered]);

  const detailRows=filtered.map(c=>{
    const ct=gCT(c.da);
    return {ng:c.ng,soCT:c.ct,doiTuong:getName(c.loai,c.kh),
      congTrinh:ct?ct.ten.split(" ").slice(0,3).join(" "):"",
      loaiTag:c.loai==="PT"?"Thu":"Trả",dg:c.dg,
      ps:f(c.ps),daTT:f(c.daTT),conLai:f(c.conLai),
      _c:{loaiTag:c.loai==="PT"?T.am:T.pr,conLai:c.conLai>0?T.am:T.gn}};
  });

  return (<div>
    <FilterRow>
      <DateRange label="Thời gian:" from={dateFrom} to={dateTo} onFrom={setDateFrom} onTo={setDateTo}/>
      <MultiSelect label="Khách hàng:" options={dtOptions} selected={khSel} onChange={setKhSel} w={155}/>
      <MultiSelect label="Công trình:" options={DM_CT.map(c=>({label:c.ten,value:c.ma}))} selected={daSel} onChange={setDaSel} w={155}/>
      <Select label="Loại:" value={loai} onChange={v=>{setLoai(v);setKhSel([]);}} options={[{label:"Tất cả",value:"ALL"},{label:"Phải thu",value:"PT"},{label:"Phải trả",value:"PTr"}]} w={110}/>
    </FilterRow>

    <div style={{display:"flex",flexWrap:"wrap",gap:9,marginBottom:11}}>
      <KPI label="Công nợ phát sinh" value={f(tongPS)} color={T.bl} sub={filtered.length+" khoản"}/>
      <KPI label="Đã xử lý" value={f(tongDaTT)} color={T.gn} sub="Đã thu / đã trả"/>
      <KPI label="Net công nợ" value={f(netCN)} color={T.am} sub="Còn phải thu/trả"/>
      <div style={{background:T.card,borderRadius:10,padding:"13px 15px",border:"1px solid "+T.bdr,flex:"1 1 170px",minWidth:165,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:hieuQua>70?T.gn:hieuQua>40?T.am:T.rd}}/>
        <div style={{fontSize:10,color:T.txD,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:.7}}>Tỷ lệ xử lý</div>
        <div style={{fontSize:19,fontWeight:700,color:T.tx,fontFamily:"'DM Mono',monospace"}}>{hieuQua.toFixed(1)}%</div>
        <div style={{height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,marginTop:5,overflow:"hidden"}}>
          <div style={{width:hieuQua+"%",height:"100%",background:hieuQua>70?T.gn:hieuQua>40?T.am:T.rd,borderRadius:3}}/>
        </div>
        <div style={{fontSize:8.5,color:T.txD,marginTop:3}}>Đã TT {f(tongDaTT)} / PS {f(tongPS)}</div>
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,marginBottom:11}}>
      <Box title="Công nợ còn lại theo đối tượng"><Donut data={dtDonut} size={140}/></Box>
      <Box title="Công nợ lũy kế theo ngày">
        {cumByDay.length>1 ? <AreaChart data={cumByDay} color={T.am} w={Math.max(cumByDay.length*25+40,200)} h={150}/>
        : <div style={{color:T.txM,fontSize:11,padding:20,textAlign:"center"}}>Cần ít nhất 2 ngày dữ liệu</div>}
      </Box>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr",gap:11,marginBottom:11}}>
      <Box title="Net công nợ theo ngày (Phải thu vs Phải trả)">
        {netByDay.length>0 ? (()=>{
          const vw=Math.max(netByDay.length*32+50,220);
          const mx=Math.max(...netByDay.map(x=>x.pt+x.ptr),1);
          return <svg width="100%" viewBox={"0 0 "+vw+" 165"} style={{overflow:"visible"}}>
            {netByDay.map((d,i)=>{
              const bw=18, gap=netByDay.length>1?(vw-40)/netByDay.length:32;
              const x=25+i*gap;
              const hPT=Math.max((d.pt/mx)*110,2);
              const hPTr=Math.max((d.ptr/mx)*110,2);
              return <g key={i}>
                <rect x={x} y={130-hPT-hPTr} width={bw} height={hPTr} rx={3} fill={T.rd} opacity={.8}/>
                <rect x={x} y={130-hPT} width={bw} height={hPT} rx={3} fill={T.am} opacity={.85}/>
                <text x={x+bw/2} y={148} textAnchor="middle" fill={T.txD} fontSize={6.5} transform={"rotate(-35,"+(x+bw/2)+",148)"}>{d.ng}</text>
              </g>;
            })}
            <g transform="translate(10,5)">
              <rect width={7} height={7} rx={2} fill={T.am}/><text x={10} y={7} fill={T.txD} fontSize={7}>Phải thu còn</text>
              <rect y={12} width={7} height={7} rx={2} fill={T.rd}/><text x={10} y={19} fill={T.txD} fontSize={7}>Phải trả còn</text>
            </g>
          </svg>;
        })() : <div style={{color:T.txM,fontSize:11,padding:20,textAlign:"center"}}>Không có dữ liệu</div>}
      </Box>
    </div>

    <Box title="Tổng hợp công nợ theo công trình">
      <Tbl cols={[
        {l:"Công trình",k:"ct"},
        {l:"Phải thu",k:"ptPS",a:"right",m:1},{l:"Đã thu",k:"ptTT",a:"right",m:1},{l:"Còn P.Thu",k:"ptCon",a:"right",m:1},
        {l:"Phải trả",k:"ptrPS",a:"right",m:1},{l:"Đã trả",k:"ptrTT",a:"right",m:1},{l:"Còn P.Trả",k:"ptrCon",a:"right",m:1},
        {l:"Net",k:"net",a:"right",m:1},
      ]} rows={thCT} maxH={280}/>
    </Box>

    <Box title="Chi tiết công nợ phát sinh theo ngày">
      <Tbl cols={[
        {l:"Ngày PS",k:"ng"},{l:"Số CT",k:"soCT"},{l:"Khách hàng",k:"doiTuong"},{l:"Công trình",k:"congTrinh"},
        {l:"Loại",k:"loaiTag"},{l:"Nội dung",k:"dg"},
        {l:"Phát sinh",k:"ps",a:"right",m:1},{l:"Đã TT",k:"daTT",a:"right",m:1},{l:"Còn lại",k:"conLai",a:"right",m:1},
      ]} rows={detailRows} maxH={500}/>
    </Box>
  </div>);
};

// ═══════════════════════════════════════

const P4=()=>{
  const [khSel,setKhSel]=useState([]);
  const [dateFrom,setDateFrom]=useState("01/01/2026");
  const [dateTo,setDateTo]=useState("26/05/2026");
  const [daSel,setDaSel]=useState([]);

  const cpF=daSel.length===0?CP:CP.filter(c=>daSel.includes(c.da));

  const tsF=daSel.length===0?TSCD:TSCD.filter(t=>daSel.includes(t.da));
  const khByCT={};
  TSCD.forEach(t=>{khByCT[t.da]=(khByCT[t.da]||0)+t.ngGia/t.thKH*5;});
  const tongKH=tsF.reduce((s,t)=>s+t.ngGia/t.thKH*5,0);
  const tongCPDA=tongCPTT+tongKH;

  const byNhom={};
  cpF.forEach(c=>{const k=c.maCP;byNhom[k]=byNhom[k]||{ten:{CPNVL:"NVL",CPMTC:"Máy TC",CPNC:"Nhân công",TP:"Thầu phụ"}[k]||k,ps:0};byNhom[k].ps+=c.ps;});
  if(tongKH>0) byNhom["CPKH"]={ten:"Khấu hao TB",ps:tongKH};
  const nhomDonut=Object.entries(byNhom).map(([k,v])=>({l:v.ten,v:v.ps})).filter(d=>d.v>0).sort((a,b)=>b.v-a.v);

  const cpCTBar=DM_CT.map(ct=>{
    const tt=CP.filter(c=>c.da===ct.ma).reduce((s,c)=>s+c.ps,0);
    const kh=khByCT[ct.ma]||0;
    return {l:ct.ten.split(" ").slice(0,2).join(" "),a:tt,b:kh};
  }).filter(d=>d.a>0||d.b>0);

  const tblCP=useMemo(()=>{
    let stt=0;
    const rows=[];
    DM_CT.forEach(ct=>{
      const items=CP.filter(c=>c.da===ct.ma);
      if(items.length===0) return;
      items.forEach(c=>{
        stt++;
        rows.push({stt,ct:ct.ten,maCP:c.maCP,tenCP:{CPNVL:"CP Nguyên vật liệu",CPMTC:"CP Máy thi công",CPNC:"CP Nhân công",TP:"Thầu phụ"}[c.maCP]||c.maCP,
          soDuDK:f(0),psKy:f(c.ps),soDuCK:f(c.ps),ghiChu:""});
      });
      const kh=khByCT[ct.ma]||0;
      if(kh>0){stt++;rows.push({stt,ct:ct.ten,maCP:"CPKH",tenCP:"Khấu hao thiết bị",soDuDK:f(0),psKy:f(kh),soDuCK:f(kh),ghiChu:"Phân bổ 5 tháng"});}
    });
    return rows;
  },[cpF]);

  const cpVPDonut=Object.entries(CPVP).map(([k,v])=>({l:{luong:"Lương",bhxh:"BHXH",thue:"Thuê VP",dien:"Điện nước",vpp:"VPP",hc:"Hành chính",ql:"Quản lý"}[k],v}));
  const vpByMonth=MONTHS.map(m=>({l:"T"+m.slice(0,2),v:CPVP_total/5}));

  return (<div>
    <FilterRow>
      <DateRange label="Thời gian:" from={dateFrom} to={dateTo} onFrom={setDateFrom} onTo={setDateTo}/>
      <MultiSelect label="Khách hàng:" options={[...DM_KH,...DM_NCC].map(k=>({label:k.ten,value:k.ma}))} selected={khSel} onChange={setKhSel} w={170}/>
      <MultiSelect label="Công trình:" options={DM_CT.map(c=>({label:c.ten,value:c.ma}))} selected={daSel} onChange={setDaSel} w={200}/>
    </FilterRow>

    <div style={{display:"flex",flexWrap:"wrap",gap:9,marginBottom:11}}>
      <KPI label="CP Trực tiếp" value={f(tongCPTT)} color={T.rd} sub="NVL + MTC + NC + TP"/>
      <KPI label="Khấu hao TB" value={f(tongKH)} color={T.pr} sub="5 tháng phân bổ"/>
      <KPI label="Tổng CP Dự án" value={f(tongCPDA)} color={T.or}/>
      <KPI label="CP Văn phòng" value={f(CPVP_total)} color={T.am} sub="Cấp công ty"/>
      <KPI label="Tổng chi phí" value={f(tongCPDA+CPVP_total)} color={"#c0392b"}/>
    </div>

    <div style={{fontSize:13,fontWeight:700,color:T.tx,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
      <div style={{width:4,height:16,background:T.or,borderRadius:2}}/>Chi phí dự án / công trình
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:11,marginBottom:11}}>
      <Box title="Cơ cấu chi phí dự án"><Donut data={nhomDonut} size={130}/></Box>
      <Box title="CP Trực tiếp vs Khấu hao theo công trình">
        <GroupedBar data={cpCTBar} h={140} w={250} lA="CP Trực tiếp" lB="Khấu hao TB"/>
      </Box>
      <Box title="Chi tiết khấu hao TB phân bổ">
        <Tbl cols={[
          {l:"Tên TB",k:"ten"},{l:"NG",k:"ngGia",a:"right",m:1},
          {l:"KH/th",k:"khThang",a:"right",m:1},{l:"KH 5th",k:"kh5",a:"right",m:1},{l:"CT",k:"da"},

          ten:t.ten,ngGia:f(t.ngGia),khThang:f(t.ngGia/t.thKH),kh5:f(t.ngGia/t.thKH*5),
          da:gCT(t.da)?gCT(t.da).ten.split(" ").slice(0,2).join(" "):"",

    <Box title="Tổng hợp chi phí dự án">

    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:11,marginBottom:11}}>

      <Box title="CP VP theo tháng"><AreaChart data={vpByMonth} color={T.pr} w={240} h={125}/></Box>

          {l:"Nhóm chi phí",k:"nhom"},
          {l:"TB/Th",k:"thang",a:"right",m:1},{l:"Lũy kế",k:"ky",a:"right",m:1},
          {l:"%",k:"tyTrong",a:"right",m:1},

      </Box>
    </div>
  </div>);
};

// ═══════════════════════════════════════
// PAGE 5: DÒNG TIỀN
// ═══════════════════════════════════════
const P5=()=>{
  const [dateFrom,setDateFrom]=useState("01/01/2026");
  const [dateTo,setDateTo]=useState("26/05/2026");
  const [khSel,setKhSel]=useState([]);
  const [da,setDa]=useState("ALL");
  const [quy,setQuy]=useState("ALL");
  const tnF=TN.filter(t=>inD(t.da||"",da)&&inDateRange(t.ng,dateFrom,dateTo)&&(quy==="ALL"||t.loaiQ===quy));
  const soDuDau=3500;
  const tThu=tnF.reduce((s,t)=>s+t.thu,0), tChi=tnF.reduce((s,t)=>s+t.chi,0);
  const soDuCuoi=soDuDau+tThu-tChi;
  const dtAll=DT.reduce((s,d)=>s+d.gt,0);
  const byMonth=MONTHS.map(m=>{const d=tnF.filter(t=>gM(t.ng)===m);return{l:"T"+m.slice(0,2),thu:d.reduce((s,t)=>s+t.thu,0),chi:d.reduce((s,t)=>s+t.chi,0)};});
  const byCT={};tnF.forEach(t=>{const n=gCT(t.da)?.ten?.split(" ").slice(0,2).join(" ")||(t.da?"Khác":"VP Cty");byCT[n]=byCT[n]||{thu:0,chi:0};byCT[n].thu+=t.thu;byCT[n].chi+=t.chi;});
  const cfCTData=Object.entries(byCT).map(([l,v])=>({l,v:v.thu-v.chi})).sort((a,b)=>b.v-a.v);
  const cumCF=byMonth.reduce((acc,m)=>{const last=acc.length?acc[acc.length-1].v:soDuDau;acc.push({l:m.l,v:last+m.thu-m.chi});return acc;},[]);
  const rowsThu=tnF.filter(t=>t.thu>0).map(t=>({ng:t.ng,ct:t.ctThu,dt:gCT(t.da)?.cdt||gCT(t.da)?.ten||"—",dg:t.dg,tm:t.loaiQ==="TM"?f(t.thu):"",nh:t.loaiQ==="NH"?f(t.thu):"",tong:f(t.thu)}));
  const rowsChi=tnF.filter(t=>t.chi>0).map(t=>({ng:t.ng,ct:t.ctChi,dt:gCT(t.da)?.ten?.split(" ").slice(0,3).join(" ")||"VP Cty",dg:t.dg,tm:t.loaiQ==="TM"?f(t.chi):"",nh:t.loaiQ==="NH"?f(t.chi):"",tong:f(t.chi)}));
  return (<div>
    <FilterRow>
      <DateRange label="Thời gian:" from={dateFrom} to={dateTo} onFrom={setDateFrom} onTo={setDateTo}/>
      <MultiSelect label="Khách hàng:" options={[...DM_KH,...DM_NCC].map(k=>({label:k.ten,value:k.ma}))} selected={khSel} onChange={setKhSel} w={170}/>
      <Select label="Công trình:" value={da} onChange={setDa} options={[{label:"Tất cả",value:"ALL"},...DM_CT.map(c=>({label:c.ten,value:c.ma}))]} w={180}/>
      <Select label="Quỹ:" value={quy} onChange={setQuy} options={[{label:"TM+NH",value:"ALL"},{label:"Tiền mặt",value:"TM"},{label:"Ngân hàng",value:"NH"}]} w={120}/>
    </FilterRow>
    <div style={{display:"flex",flexWrap:"wrap",gap:9,marginBottom:11}}>
      <KPI label="Đầu kỳ" value={f(soDuDau)} color={T.bl}/><KPI label="Tổng thu" value={f(tThu)} color={T.gn}/>
      <KPI label="Tổng chi" value={f(tChi)} color={T.rd}/><KPI label="Thuần" value={f(tThu-tChi)} color={tThu-tChi>=0?T.gn:T.rd} accent={tThu-tChi>=0?T.gn:T.rd}/>
      <KPI label="Cuối kỳ" value={f(soDuCuoi)} color={T.cy}/><KPI label="Thu/DT" value={ps(tThu,dtAll)} color={T.am}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:11,marginBottom:11}}>
      <Box title="Số dư cuối kỳ lũy kế"><AreaChart data={cumCF} color={T.cy} w={250} h={140}/></Box>
      <Box title="Thu vs Chi theo tháng"><StackedBar data={byMonth.map(m=>({l:m.l,a:m.thu,b:m.chi}))} w={250} h={140}/></Box>
      <Box title="Dòng tiền theo công trình"><HBar data={cfCTData}/></Box>
    </div>
    <Box title="Nhật ký thu tiền">
      <Tbl cols={[{l:"Ngày",k:"ng"},{l:"CT",k:"ct"},{l:"Khách hàng",k:"dt"},{l:"Diễn giải",k:"dg"},{l:"TM",k:"tm",a:"right",m:1},{l:"NH",k:"nh",a:"right",m:1},{l:"Tổng",k:"tong",a:"right",m:1}]} rows={rowsThu} maxH={240}/>
    </Box>
    <Box title="Nhật ký chi tiền">
      <Tbl cols={[{l:"Ngày",k:"ng"},{l:"CT",k:"ct"},{l:"Khách hàng",k:"dt"},{l:"Diễn giải",k:"dg"},{l:"TM",k:"tm",a:"right",m:1},{l:"NH",k:"nh",a:"right",m:1},{l:"Tổng",k:"tong",a:"right",m:1}]} rows={rowsChi} maxH={240}/>
    </Box>
  </div>);
};

// ═══════════════════════════════════════
// PAGE 6: HÀNG KHO
// ═══════════════════════════════════════
const P6=()=>{
  const parseD=s=>{const p=s.split("/");return new Date(+p[2],+p[1]-1,+p[0]);};

  const [nccSel,setNccSel]=useState([]);
  const [daSel,setDaSel]=useState([]);
  const [dateFrom,setDateFrom]=useState("01/01/2026");
  const [dateTo,setDateTo]=useState("26/05/2026");

  const khoF=useMemo(()=>{
    const fd=parseD(dateFrom),td=parseD(dateTo);
    return KHO.filter(k=>{
      if(nccSel.length>0&&!nccSel.includes(k.ncc)) return false;
      if(daSel.length>0&&!daSel.includes(k.da)) return false;
      const d=parseD(k.ng);
      if(d<fd||d>td) return false;
      return true;
    });
  },[nccSel,daSel,dateFrom,dateTo]);

  const soVT=khoF.length;
  const tongNhapSL=khoF.reduce((s,k)=>s+k.nhapSL,0);
  const tongNhapTT=khoF.reduce((s,k)=>s+k.nhapSL*k.nhapGia,0);
  const tongXuatSL=khoF.reduce((s,k)=>s+k.xuatSL,0);
  const tongXuatTT=khoF.reduce((s,k)=>s+k.xuatSL*k.nhapGia,0);
  const tongTonSL=khoF.reduce((s,k)=>s+k.tonDau+k.nhapSL-k.xuatSL,0);
  const tongTonTT=khoF.reduce((s,k)=>s+(k.tonDau+k.nhapSL-k.xuatSL)*k.nhapGia,0);
  const chenhLechSL=Math.round(tongTonSL*0.02);
  const chenhLechTT=tongTonTT*0.02;
  const soTB=TSCD.length;
  const soHD=TSCD.filter(t=>t.tt==="Hoạt động").length;
  const tongNgGia=TSCD.reduce((s,t)=>s+t.ngGia,0);
  const tyLeHD=soTB>0?pv(soHD,soTB):0;

  const nxtByMonth=MONTHS.map(m=>{
    const mi=khoF.filter(k=>gM(k.ng)===m);
    return {
      l:"T"+m.slice(0,2),
      nhap:mi.reduce((s,k)=>s+k.nhapSL*k.nhapGia,0),
      xuat:mi.reduce((s,k)=>s+k.xuatSL*k.nhapGia,0),
    };
  });
  const nxtCum=nxtByMonth.reduce((acc,m)=>{
    const last=acc.length?acc[acc.length-1].ton:khoF.reduce((s,k)=>s+k.tonDau*k.nhapGia,0);
    acc.push({...m,ton:last+m.nhap-m.xuat});
    return acc;
  },[]);

  const xuatByCT={};
  khoF.forEach(k=>{
    const ct=gCT(k.da);
    const n=ct?ct.ten.split(" ").slice(0,2).join(" "):k.da;
    xuatByCT[n]=(xuatByCT[n]||0)+k.xuatSL*k.nhapGia;
  });
  const xuatCTData=Object.entries(xuatByCT).map(([l,v])=>({l,v})).sort((a,b)=>b.v-a.v);

  const nxtRows=khoF.map((k,i)=>{
    const tc=k.tonDau+k.nhapSL-k.xuatSL;
    return {
      stt:i+1,maVT:k.maVT,ten:k.ten,dvt:k.dvt,
      tonDau:fn(k.tonDau),
      nhapSL:fn(k.nhapSL),nhapTT:f(k.nhapSL*k.nhapGia),
      xuatSL:fn(k.xuatSL),xuatTT:f(k.xuatSL*k.nhapGia),
      tonCuoi:fn(tc),gtTon:f(tc*k.nhapGia),
      _c:{tonCuoi:tc>0?T.gn:tc<0?T.rd:T.txD}
    };
  });

  return (<div>
    <FilterRow>
      <DateRange label="Thời gian:" from={dateFrom} to={dateTo} onFrom={setDateFrom} onTo={setDateTo}/>
      <MultiSelect label="Khách hàng:" options={DM_NCC.map(n=>({label:n.ten,value:n.ma}))} selected={nccSel} onChange={setNccSel} w={170}/>
      <MultiSelect label="Công trình:" options={DM_CT.map(c=>({label:c.ten,value:c.ma}))} selected={daSel} onChange={setDaSel} w={170}/>
    </FilterRow>

    <div style={{display:"flex",flexWrap:"wrap",gap:9,marginBottom:11}}>
      <KPI label="Tổng thiết bị" value={soTB+" TB"} color={T.bl} sub={f(tongNgGia)+" nguyên giá"}/>
      <KPI label="Tổng nhập kho" value={fn(tongNhapSL)+" SL"} color={T.gn} sub={f(tongNhapTT)+" giá trị"}/>
      <KPI label="Tổng xuất kho" value={fn(tongXuatSL)+" SL"} color={T.or} sub={f(tongXuatTT)+" giá trị"}/>
      <KPI label="Tồn kho cuối kỳ" value={fn(tongTonSL)+" SL"} color={T.cy} sub={f(tongTonTT)+" giá trị"}/>
      <KPI label="Chênh lệch kiểm kê" value={fn(chenhLechSL)+" SL"} color={T.rd} sub={f(chenhLechTT)+" hao hụt (~2%)"}/>
      <div style={{background:T.card,borderRadius:10,padding:"13px 15px",border:"1px solid "+T.bdr,flex:"1 1 155px",minWidth:150,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:tyLeHD>80?T.gn:tyLeHD>50?T.am:T.rd}}/>
        <div style={{fontSize:10,color:T.txD,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:.7}}>TB hoạt động</div>
        <div style={{fontSize:19,fontWeight:700,color:T.tx,fontFamily:"'DM Mono',monospace"}}>{tyLeHD.toFixed(0)}%</div>
        <div style={{height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,marginTop:5,overflow:"hidden"}}>
          <div style={{width:tyLeHD+"%",height:"100%",background:tyLeHD>80?T.gn:tyLeHD>50?T.am:T.rd,borderRadius:3}}/>
        </div>
        <div style={{fontSize:8.5,color:T.txD,marginTop:3}}>{soHD} hoạt động / {soTB} tổng</div>
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,marginBottom:11}}>
      <Box title="Nhập — Xuất — Tồn theo tháng">
        <svg width="100%" viewBox="0 0 340 170" style={{overflow:"visible"}}>
          {[0,.25,.5,.75,1].map((r,i)=><line key={i} x1={30} y1={15+r*120} x2={320} y2={15+r*120} stroke={T.bdr} strokeWidth=".5" strokeDasharray={r>0&&r<1?"3,3":"0"}/>)}
          {(()=>{
            const mx=Math.max(...nxtCum.flatMap(m=>[m.nhap,m.xuat,m.ton]),1);
            const pts=n=>nxtCum.map((m,i)=>({x:50+i*65,y:15+120-((m[n]/mx)*120)}));
            const line=n=>pts(n).map((p,i)=>(i===0?"M":"L")+p.x+","+p.y).join(" ");
            return <>
              <path d={line("nhap")} fill="none" stroke={T.gn} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
              <path d={line("xuat")} fill="none" stroke={T.rd} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
              <path d={line("ton")} fill="none" stroke={T.cy} strokeWidth={2.5} strokeDasharray="6,3" strokeLinecap="round" strokeLinejoin="round"/>
              {pts("nhap").map((p,i)=><circle key={"n"+i} cx={p.x} cy={p.y} r={3} fill={T.gn}/>)}
              {pts("xuat").map((p,i)=><circle key={"x"+i} cx={p.x} cy={p.y} r={3} fill={T.rd}/>)}
              {pts("ton").map((p,i)=><circle key={"t"+i} cx={p.x} cy={p.y} r={3} fill={T.cy}/>)}
              {nxtCum.map((m,i)=><text key={i} x={50+i*65} y={150} textAnchor="middle" fill={T.txD} fontSize={9}>{m.l}</text>)}
            </>;
          })()}
          <g transform="translate(30,3)">
            <line x1={0} y1={4} x2={12} y2={4} stroke={T.gn} strokeWidth={2}/><text x={15} y={7} fill={T.txD} fontSize={7.5}>Nhập</text>
            <line x1={45} y1={4} x2={57} y2={4} stroke={T.rd} strokeWidth={2}/><text x={60} y={7} fill={T.txD} fontSize={7.5}>Xuất</text>
            <line x1={85} y1={4} x2={97} y2={4} stroke={T.cy} strokeWidth={2} strokeDasharray="4,2"/><text x={100} y={7} fill={T.txD} fontSize={7.5}>Tồn</text>
          </g>
        </svg>
      </Box>
      <Box title="Giá trị xuất kho theo công trình">
        <HBar data={xuatCTData}/>
        <div style={{fontSize:9,color:T.txM,marginTop:6,padding:"5px 0",borderTop:"1px solid rgba(34,45,66,0.12)"}}>
          Cầu nối sang trang Chi phí dự án — vật tư xuất cho CT nào nhiều nhất
        </div>
      </Box>
    </div>

    <Box title="Bảng Nhập — Xuất — Tồn theo vật tư">
      <Tbl cols={[
        {l:"STT",k:"stt",a:"center"},{l:"Mã VT",k:"maVT"},{l:"Tên vật tư",k:"ten"},{l:"ĐVT",k:"dvt"},
        {l:"Đầu kỳ",k:"tonDau",a:"right",m:1},
        {l:"SL Nhập",k:"nhapSL",a:"right",m:1},{l:"GT Nhập",k:"nhapTT",a:"right",m:1},
        {l:"SL Xuất",k:"xuatSL",a:"right",m:1},{l:"GT Xuất",k:"xuatTT",a:"right",m:1},
        {l:"Tồn CK",k:"tonCuoi",a:"right",m:1},{l:"GT Tồn",k:"gtTon",a:"right",m:1},
      ]} rows={nxtRows} maxH={500}/>
    </Box>
  </div>);
};

// ═══════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════
const pages=[{id:0,label:"Tổng quan",icon:"◈",comp:P1},{id:1,label:"Doanh thu",icon:"▲",comp:P2},{id:2,label:"Chi phí",icon:"▤",comp:P4},{id:3,label:"Công nợ",icon:"◎",comp:P3},{id:4,label:"Dòng tiền",icon:"◆",comp:P5},{id:5,label:"Hàng kho",icon:"▦",comp:P6}];

function App(){
  const [act,setAct]=useState(0);
  const Comp=pages[act].comp;
  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.tx,fontFamily:"'Inter',-apple-system,sans-serif"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
      <div style={{background:"linear-gradient(135deg,#0C1220,#151D2E)",borderBottom:`1px solid ${T.bdr}`,padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:8,background:"linear-gradient(135deg,#4A90E2,#9B59B6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:"#fff"}}>EC</div>
          <div><div style={{fontSize:14,fontWeight:700,letterSpacing:.3}}>ECV CORP</div><div style={{fontSize:8.5,color:T.txM,letterSpacing:1,textTransform:"uppercase"}}>Báo cáo Tài chính Dự án · Power BI</div></div>
        </div>
        <div style={{fontSize:10,color:T.txD,textAlign:"right"}}><div>01/01/2026 → 26/05/2026</div><div style={{color:T.txM}}>Demo · ĐVT: Triệu đồng</div></div>
      </div>
      <div style={{display:"flex",gap:1,padding:"5px 18px",background:T.pnl,borderBottom:`1px solid ${T.bdr}`,overflowX:"auto"}}>
        {pages.map(pg=>(<button key={pg.id} onClick={()=>setAct(pg.id)} style={{padding:"8px 13px",borderRadius:6,border:"none",cursor:"pointer",background:act===pg.id?T.blG:"transparent",borderBottom:act===pg.id?`2px solid ${T.bl}`:"2px solid transparent",color:act===pg.id?T.bl:T.txD,fontWeight:act===pg.id?700:500,fontSize:11.5,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:12}}>{pg.icon}</span> {pg.label}</button>))}
      </div>
      <div style={{padding:"12px 18px 26px",minHeight:"calc(100vh - 120px)"}}><Comp/></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
